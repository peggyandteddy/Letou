  <style>

    html,body{

      .home{grid-template-columns:1fr}

      .result-head{align-items:flex-start}
      .reset{width:100%}
      .idx{width:38px}
      .ball{width:36px;height:36px;font-size:16px}

<body>
  <main class="app">
    <header>
      <h1>随机彩票号码生成器</h1>
      <p class="sub">首页选择玩法后，会按规则一次随机生成 5 组号码；点击"重置"会重新随机生成并覆盖原来的 5 组。</p>
    </header>

    <section class="home" aria-label="玩法选择">
      <button class="main-btn ssq" id="ssqBtn">
        <strong>双色球</strong>
        <span>规则：红球 1–33 选 6 个，蓝球 1–16 选 1 个。</span>
      </button>
      <button class="main-btn dlt" id="dltBtn">
        <strong>大乐透</strong>
        <span>规则：前区 1–35 选 5 个，后区 1–12 选 2 个。</span>
      </button>
    </section>

    <section class="result-panel" id="resultPanel" aria-live="polite">
      <div class="result-head">
        <div>
          <h2 class="result-title" id="resultTitle">双色球</h2>
          <p class="rule" id="ruleText">红球 1–33 选 6 个，蓝球 1–16 选 1 个。</p>
        </div>
        <button class="reset" id="resetBtn">重置</button>
      </div>
      <div class="groups" id="groups"></div>
    </section>

    <p class="notice">提示：本工具只做随机号码生成，不构成任何中奖预测或购彩建议。</p>
  </main>

  <script>
    const state = {
      type: null
    };

    const config = {
      ssq: {
        title: "双色球",
        rule: "红球 1–33 选 6 个，蓝球 1–16 选 1 个。",
        mainLabel: "红球",
        subLabel: "蓝球",
        mainCount: 6,
        mainMax: 33,
        subCount: 1,
        subMax: 16
      },
      dlt: {
        title: "大乐透",
        rule: "前区 1–35 选 5 个，后区 1–12 选 2 个。",
        mainLabel: "前区",
        subLabel: "后区",
        mainCount: 5,
        mainMax: 35,
        subCount: 2,
        subMax: 12
      }
    };

    const $ = id => document.getElementById(id);
    const panel = $("resultPanel");
    const groups = $("groups");
    const title = $("resultTitle");
    const ruleText = $("ruleText");

    function pad(num) {
      return String(num).padStart(2, "0");
    }

    function sampleUnique(max, count) {
      const pool = Array.from({ length: max }, (_, index) => index + 1);
      for (let i = pool.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [pool[i], pool[j]] = [pool[j], pool[i]];
      }
      return pool.slice(0, count).sort((a, b) => a - b);
    }

    function generateOne(type) {
      const c = config[type];
      return {
        main: sampleUnique(c.mainMax, c.mainCount),
        sub: sampleUnique(c.subMax, c.subCount)
      };
    }

    function ball(num, color) {
      return `<span class="ball ${color}">${pad(num)}</span>`;
    }

    function render(type) {
      state.type = type;
      const c = config[type];
      title.textContent = c.title;
      ruleText.textContent = c.rule;
      groups.innerHTML = "";

      for (let i = 0; i < 5; i++) {
        const result = generateOne(type);
        const mainBalls = result.main.map(n => ball(n, "red")).join("");
        const subBalls = result.sub.map(n => ball(n, "blue")).join("");
        const row = document.createElement("div");
        row.className = "group";
        row.innerHTML = `
          <div class="idx">第${i + 1}组</div>
          <div class="balls" aria-label="${c.title}第${i + 1}组号码">
            ${mainBalls}
            <span class="plus">+</span>
            ${subBalls}
          </div>
        `;
        groups.appendChild(row);
      }

      panel.classList.add("show");
      panel.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }

    $("ssqBtn").addEventListener("click", () => render("ssq"));
    $("dltBtn").addEventListener("click", () => render("dlt"));
    $("resetBtn").addEventListener("click", () => {
      if (state.type) render(state.type);
    });
  </script>
</body>
</html>
